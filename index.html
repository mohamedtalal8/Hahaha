<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجرة الحب والذكريات</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <audio id="bgMusic" src="song.mp3" loop></audio>

    <div class="welcome-container" id="welcomeScreen">
        <div class="welcome-card">
            <h1>مجرة من الحب<br>لأجلك</h1>
            <div class="bunny-gif">
                <img src="welcome.jpg" alt="Welcome Image" width="120" style="border-radius: 10px;">
            </div>
            <p>عيد ميلاد سعيد يا كل حياتي</p>
            <button id="enterBtn">الدخول إلى عالمنا</button>
        </div>
    </div>

    <div class="popup-card" id="popupCard">
        <div class="popup-content">
            <div class="popup-header-icon">🤍</div>
            <div class="popup-image-container">
                <img id="popupImg" src="" alt="Card Image">
            </div>
            <h2 id="popupTitle">حب حياتي</h2>
            <p id="popupText">نص الرسالة هنا...</p>
            <button id="closeBtn">عودة 🤍</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
